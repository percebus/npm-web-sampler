name: Semantic Pull-Request

# "This run was triggered by the "push" event, which is unsupported.
#  Please ensure you are using the "pull_request" event for this workflow."
on:
  workflow_call: # SRC: https://docs.github.com/en/actions/using-workflows/reusing-workflows

  # SRC: https://github.com/amannn/action-semantic-pull-request?tab=readme-ov-file#installation
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      # - synchronize (if you use required Actions)

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  # Disable HUSKY in CI
  HUSKY: 0

permissions:
  contents: read

jobs:
  semantic-pull-request:
    uses: percebus/github-actions-compliance/.github/workflows/semantic-pull-request.yml@main
    name: github-actions-compliance
    permissions:
      pull-requests: read
