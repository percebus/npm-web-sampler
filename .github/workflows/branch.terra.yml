name: terraform

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    paths:
      - .github/workflows/branch.terra.yml
      - terra/**

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - name: GITHUB_OUTPUT
        id: set_variables
        run: |
          echo "STACK_ID=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
    outputs:
      STACK_ID: ${{ steps.set_variables.outputs.STACK_ID }}

  #
  qa:
    name: terraform
    needs: setup
    # SRC: https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#permissions
    # SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    uses: percebus/github-actions-terraform/.github/workflows/qa.yml@main
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      # tflint
      tflint-version: latest

      # terraform compliance
      features_directory: features

      # terraform test
      test_environment: test
      unit_tests_directory: tests
      integration_tests_directory: integration_tests

      # plan + apply + destroy
      environment: ci-branch
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.setup.outputs.STACK_ID }}"
