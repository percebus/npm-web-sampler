name: terraform

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    paths:
      - ./.github/wokflows/branch.terra.yml
      - ./terra/**

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  # Disable HUSKY in CI
  HUSKY: 0

permissions:
  contents: read

jobs:
  terraform_validate:
    name: terraform
    uses: percebus/github-actions-terraform/.github/workflows/validate.yml@main
    with:
      override: true
