name: terraform

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    paths:
      - .github/workflows/branch.terra.yml
      - terra/**

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - name: GITHUB_OUTPUT
        id: set_variables
        run: |
          echo "STACK_ID=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
          echo "environment=ci-branch" >> $GITHUB_OUTPUT
    outputs:
      STACK_ID: ${{ steps.set_variables.outputs.STACK_ID }}
      environment: ${{ steps.set_variables.outputs.environment }}

  # TODO? add environment
  terraform_test:
    name: terraform
    needs: setup
    # SRC: https://github.com/EnricoMi/publish-unit-test-result-action?tab=readme-ov-file#permissions
    # SRC: https://github.com/dorny/test-reporter?tab=readme-ov-file#recommended-setup-for-public-repositories
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    uses: percebus/github-actions-terraform/.github/workflows/test.yml@main
    with:
      override: true
      TF_CLI_ARGS_init: -reconfigure

  terraform_plan_then_apply:
    name: terraform
    needs:
      - terraform_test
      - setup
    permissions:
      contents: read
      actions: read
      pull-requests: write

    uses: percebus/github-actions-terraform/.github/workflows/plan_then_apply.yml@main
    with:
      environment: ${{ needs.setup.outputs.environment }}
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.setup.outputs.STACK_ID }}"
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

  terraform_plan-destroy_then_apply:
    name: terraform
    needs:
      - setup
      - terraform_plan_then_apply
    permissions:
      contents: read
      actions: read
      pull-requests: write

    uses: percebus/github-actions-terraform/.github/workflows/plan-destroy_then_apply.yml@main
    with:
      ref: ${{ github.event.workflow_run.head_branch }}
      # validate: false  # TODO
      environment: ${{ needs.setup.outputs.environment }}
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.setup.outputs.STACK_ID }}"
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
