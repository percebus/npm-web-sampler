name: terraform

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    paths:
      - .github/wokflows/branch.terra.yml
      - terra/**

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  # Disable HUSKY in CI
  HUSKY: 0

permissions:
  contents: read

jobs:
  # FIXME replace me w/ github-actions-terraform/.../fmt_check
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE }}

      - uses: percebus/github-actions-python/.github/actions/setup@main
      - uses: percebus/github-actions-nvm/.github/actions/install_and_use@main
      - uses: percebus/github-actions-npm/.github/actions/install@main

      - uses: percebus/github-actions-terraform/.github/actions/setup@main

      # terraform lint
      - name: npm run lint:terraform
        run: npm run lint:terraform

  terraform_validate:
    name: terraform
    needs: verify
    uses: percebus/github-actions-terraform/.github/workflows/validate.yml@main
    with:
      override: true
