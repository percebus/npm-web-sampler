name: helm

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
    paths:
      - ./.github/wokflows/branch.helm.yml
      - ./helm/**

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # FIXME replace w/ github-actions-helm/.github/workflows/lint
  helm_lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE }}

      - uses: percebus/github-actions-helm/.github/actions/setup@main
      - uses: percebus/github-actions-helm/.github/actions/lint@main
        with:
          working-directory: ./helm/npm-web-sampler
