name: Un-Deployment

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          # ci
          - ci-main
          - ci-branch
          #
          # requires approval
          - dev
          - prod

concurrency:
  # NOTE: Cancelling an apply might corrupt the state.
  group: ${{ github.event_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true

permissions:
  contents: read

jobs:
  VARIABLES:
    name: VARIABLES
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - name: GITHUB_OUTPUT
        id: GITHUB_OUTPUT
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "STACK_ID=$(git rev-parse --short ${{ github.event.workflow_run.head_sha }})" >> $GITHUB_OUTPUT
            echo "environment=ci-branch" >> $GITHUB_OUTPUT
          else
            echo "STACK_ID=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
            echo "environment=${{ inputs.environment || 'ci-main' }}" >> $GITHUB_OUTPUT
          fi
    outputs:
      STACK_ID: ${{ steps.GITHUB_OUTPUT.outputs.STACK_ID }}
      environment: ${{ steps.GITHUB_OUTPUT.outputs.environment }}

  terraform_plan-destroy_then_apply:
    name: terraform
    needs: VARIABLES
    permissions:
      contents: read
      actions: read
      pull-requests: write

    uses: percebus/github-actions-terraform/.github/workflows/plan-destroy_then_apply.yml@main
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    with:
      ref: ${{ github.event.workflow_run.head_branch }}
      environment: ${{ needs.VARIABLES.outputs.environment }}
      TF_CLI_ARGS_plan: "-var STACK_ID=${{ needs.VARIABLES.outputs.STACK_ID }}"
